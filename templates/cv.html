<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} — {{ROLE}}</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; font-size: 13px; color: #222; background: #fff; }
.page { width: 210mm; min-height: 297mm; margin: 0 auto; padding: 18mm 16mm 14mm; }
h1 { font-size: 22px; font-weight: 700; letter-spacing: 0.3px; }
.role-title { font-size: 13px; color: #555; margin-top: 2px; }
.contact { font-size: 12px; color: #555; margin-top: 6px; }
.contact a { color: #2d3a4a; text-decoration: none; }
hr { border: none; border-top: 1.5px solid #2d3a4a; margin: 10px 0; }
h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #2d3a4a; font-weight: 700; margin: 14px 0 6px; }
p, li { font-size: 12.5px; line-height: 1.55; }
ul { padding-left: 18px; }
.two-col { display: grid; grid-template-columns: 62% 35%; gap: 3%; }
.section { margin-bottom: 10px; }
.job-title { font-weight: 700; font-size: 13px; }
.job-company { font-size: 12px; color: #555; }
.job-date { font-size: 11px; color: #777; float: right; }
.skills-list { display: flex; flex-wrap: wrap; gap: 4px 8px; list-style: none; padding: 0; }
.skills-list li { background: #eef1f5; padding: 2px 8px; border-radius: 4px; font-size: 11.5px; }
.gdpr { margin-top: 18px; font-size: 10px; color: #aaa; border-top: 1px solid #eee; padding-top: 8px; }
@media print { .page { width: 100%; padding: 14mm 12mm; } }
</style>
</head>
<body>
<div class="page">
  <h1>{{NAME}}</h1>
  <div class="role-title">{{ROLE}}</div>
  <div class="contact">{{EMAIL}} · {{PHONE}} · {{LOCATION}} · <a href="{{LINKEDIN}}">LinkedIn</a> · <a href="{{GITHUB}}">GitHub</a></div>
  <hr>
  <div class="two-col">
    <div>
      <div class="section">
        <h2>Professional Summary</h2>
        <p>{{SUMMARY}}</p>
      </div>
      <div class="section">
        <h2>Experience</h2>
        {{EXPERIENCE}}
      </div>
    </div>
    <div>
      <div class="section">
        <h2>Skills</h2>
        <ul class="skills-list">{{SKILLS}}</ul>
      </div>
      <div class="section">
        <h2>Education</h2>
        {{EDUCATION}}
      </div>
    </div>
  </div>
  <p class="gdpr">{{GDPR}}</p>
</div>
</body>
</html>
